<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>惠心小助 AI资助政策问答助手</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  </head>
  <body>
    <main class="page-shell">
      <section class="hero-card" aria-labelledby="page-title">
        <p class="eyebrow">惠州学院 · 惠心筑梦实践队</p>
        <h1 id="page-title">惠心小助</h1>
        <h2>AI资助政策问答助手</h2>
        <p class="tagline">国家资助伴你成长，助学贷款助力成才</p>
      </section>

      <section class="info-card" aria-label="功能说明">
        <p>本助手用于解答国家资助政策、生源地信用助学贷款、绿色通道、国家助学金、勤工助学、诚信还款等常见问题。</p>
      </section>

      <section class="quick-card" aria-label="快捷问题">
        <div class="section-title">快捷问题</div>
        <div class="quick-grid">
          <button type="button" class="quick-question">考上大学但暂时交不起学费怎么办？</button>
          <button type="button" class="quick-question">助学贷款是不是高利贷？</button>
          <button type="button" class="quick-question">生源地信用助学贷款在哪里申请？</button>
          <button type="button" class="quick-question">首次申请助学贷款需要准备什么材料？</button>
          <button type="button" class="quick-question">什么是绿色通道？</button>
          <button type="button" class="quick-question">国家助学金和奖学金有什么区别？</button>
          <button type="button" class="quick-question">贷款什么时候开始还？</button>
          <button type="button" class="quick-question">申请资助会不会影响征信？</button>
          <button type="button" class="quick-question">家长不会操作申请系统怎么办？</button>
          <button type="button" class="quick-question">共同借款人必须是父母吗？</button>
        </div>
      </section>

      <section class="chat-card" aria-label="聊天区域">
        <div id="chatMessages" class="chat-messages" aria-live="polite">
          <div class="message-row ai">
            <div class="avatar" aria-hidden="true">惠</div>
            <div class="message-bubble">你好，我是惠心小助。你可以问我助学贷款、绿色通道、国家助学金、勤工助学等问题。</div>
          </div>
        </div>

        <form id="chatForm" class="chat-form">
          <input
            id="messageInput"
            type="text"
            maxlength="600"
            autocomplete="off"
            placeholder="请输入你的问题，例如：助学贷款是不是高利贷？"
            aria-label="请输入你的问题"
          >
          <button id="sendButton" type="submit">发送</button>
        </form>
      </section>

      <footer class="footer-note">
        <p>温馨提示：本助手仅作为政策宣传和咨询辅助工具，不代替官方资格认定。具体办理要求以当地学生资助管理中心、国家开发银行学生在线系统及学校最新通知为准。请勿输入身份证号、银行卡号、手机号、家庭详细住址等敏感信息。</p>
        <p class="scan-text">扫码访问惠心小助，随时了解资助政策。</p>
      </footer>
    </main>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
  </body>
</html>
